<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مشتریان | پنل مدیریت مهراب</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="icon" type="image/png" href="../assets/logo.png" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>

  <div class="admin-topbar">
    <button class="admin-menu-toggle" id="adminMenuToggle" aria-label="باز کردن منو">☰</button>
    <span class="admin-topbar-title">مشتریان</span>
  </div>
  <div class="admin-sidebar-overlay" id="adminSidebarOverlay"></div>

  <div class="admin-shell">
    <aside class="admin-sidebar" id="adminSidebar"></aside>

    <main class="admin-main">
      <div class="admin-page-head">
        <div>
          <h1 class="admin-page-title">مشتریان</h1>
          <p class="admin-page-sub">لیست مشتریان ثبت‌نام‌شده در فروشگاه.</p>
        </div>
      </div>

      <div class="admin-toolbar">
        <input type="search" id="searchCustomers" placeholder="جستجو بر اساس نام یا شماره موبایل…" />
      </div>

      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>شماره تماس</th>
              <th>نام</th>
              <th>نام خانوادگی</th>
              <th>تاریخ عضویت</th>
              <th>آخرین ورود</th>
              <th>ارجاع‌دهنده</th>
              <th>آدرس</th>
            </tr>
          </thead>
          <tbody id="customersTableBody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <div class="admin-toast" id="adminToast" role="status"></div>

  <script src="../js/store.js"></script>
  <script src="../js/customers.js"></script>
  <script src="js/admin-auth.js"></script>
  <script src="js/admin-shell.js"></script>
  <script src="js/admin-customers.js"></script>
</body>
</html>
