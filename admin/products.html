<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مدیریت محصولات | پنل مدیریت مهراب</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Estedad:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="icon" type="image/png" href="../assets/logo.png" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>

  <div class="admin-topbar">
    <button class="admin-menu-toggle" id="adminMenuToggle" aria-label="باز کردن منو">☰</button>
    <span class="admin-topbar-title">محصولات</span>
  </div>
  <div class="admin-sidebar-overlay" id="adminSidebarOverlay"></div>

  <div class="admin-shell">
    <aside class="admin-sidebar" id="adminSidebar"></aside>

    <main class="admin-main">
      <div class="admin-page-head">
        <div>
          <h1 class="admin-page-title">مدیریت محصولات</h1>
          <p class="admin-page-sub">افزودن، ویرایش و حذف محصولات کالکشن عطر مهراب.</p>
        </div>
        <button type="button" class="btn btn-solid" id="addProductBtn">+ افزودن محصول</button>
      </div>

      <div class="admin-toolbar">
        <input type="search" id="searchProducts" placeholder="جستجوی نام محصول…" />
      </div>

      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th></th>
              <th>نام</th>
              <th>خانواده</th>
              <th>جنسیت</th>
              <th>قیمت پایه</th>
              <th>موجودی</th>
              <th>تخفیف</th>
              <th>جدید</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="productsTableBody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- ============ ADD/EDIT MODAL ============ -->
  <div class="admin-modal-overlay" id="productModalOverlay">
    <div class="admin-modal">
      <div class="admin-modal-head">
        <h2 id="productModalTitle">افزودن محصول</h2>
        <button type="button" class="admin-modal-close" id="productModalClose">×</button>
      </div>

      <form class="admin-form" id="productForm">
        <input type="hidden" id="productId" />

        <div class="admin-form-grid">
          <div class="admin-field admin-field-full">
            <label for="productName">نام محصول</label>
            <input type="text" id="productName" required />
          </div>

          <div class="admin-field">
            <label for="productFamily">خانواده رایحه</label>
            <select id="productFamily" required></select>
          </div>
          <div class="admin-field">
            <label for="productGender">جنسیت</label>
            <select id="productGender" required></select>
          </div>

          <div class="admin-field">
            <label for="productTint">رنگ نمایشی (تینت)</label>
            <input type="color" id="productTint" value="#b8892f" />
          </div>
          <div class="admin-field">
            <label for="productStock">موجودی</label>
            <input type="number" id="productStock" min="0" required />
          </div>

          <div class="admin-field">
            <label for="productDiscount">درصد تخفیف (۰ = بدون تخفیف)</label>
            <input type="number" id="productDiscount" min="0" max="90" value="0" />
          </div>
          <div class="admin-field">
            <label for="productRating">امتیاز (از ۵)</label>
            <input type="number" id="productRating" min="0" max="5" step="0.1" value="4.5" />
          </div>

          <div class="admin-field-full admin-checkbox-row">
            <input type="checkbox" id="productIsNew" />
            <label for="productIsNew" style="margin:0">نمایش به‌عنوان محصول «جدید»</label>
          </div>
        </div>

        <p class="admin-field-hint">قیمت هر حجم (تومان) — خالی گذاشتن یعنی آن حجم عرضه نمی‌شود.</p>
        <div class="admin-variant-row">
          <div class="admin-field"><label for="price30">۳۰ میل‌لیتر</label><input type="number" id="price30" min="0" /></div>
          <div class="admin-field"><label for="price50">۵۰ میل‌لیتر</label><input type="number" id="price50" min="0" /></div>
          <div class="admin-field"><label for="price100">۱۰۰ میل‌لیتر</label><input type="number" id="price100" min="0" /></div>
        </div>

        <div class="admin-form-grid">
          <div class="admin-field"><label for="noteTop">نت سر</label><input type="text" id="noteTop" /></div>
          <div class="admin-field"><label for="noteHeart">نت میانی</label><input type="text" id="noteHeart" /></div>
          <div class="admin-field admin-field-full"><label for="noteBase">نت پایه</label><input type="text" id="noteBase" /></div>
        </div>

        <div class="admin-field">
          <label for="productDescription">توضیحات محصول</label>
          <textarea id="productDescription" rows="4" required></textarea>
        </div>

        <div class="admin-form-actions">
          <button type="submit" class="btn btn-solid">ذخیره محصول</button>
          <button type="button" class="btn btn-ghost" id="productCancelBtn" style="color:var(--ink); border-color:var(--line)">انصراف</button>
        </div>
      </form>
    </div>
  </div>

  <div class="admin-toast" id="adminToast" role="status"></div>

  <script src="../js/store.js"></script>
  <script src="../js/products.js"></script>
  <script src="../js/categories.js"></script>
  <script src="js/admin-auth.js"></script>
  <script src="js/admin-shell.js"></script>
  <script src="js/admin-products.js"></script>
</body>
</html>
